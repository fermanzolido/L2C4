<html>

<body>
    <center>
        <table width=270>
            <tr>
                <td width=45><button value="Main" action="bypass -h admin_admin" width=45 height=15 back="sek.cbui94"
                        fore="sek.cbui92"></td>
                <td width=180>
                    <center>
                        <font color="LEVEL">Donation Management</font>
                    </center>
                </td>
                <td width=45><button value="Back" action="bypass -h admin_admin" width=45 height=15 back="sek.cbui94"
                        fore="sek.cbui92"></td>
            </tr>
        </table>
        <br>
        <table width=270>
            <tr>
                <td>Player Name:</td>
                <td>
                    <edit var="name" width=120 height=15>
                </td>
            </tr>
            <tr>
                <td>Item ID:</td>
                <td>
                    <edit var="id" width=120 height=15>
                </td>
            </tr>
            <tr>
                <td>Amount:</td>
                <td>
                    <edit var="amount" width=120 height=15>
                </td>
            </tr>
            <tr>
                <td>Enchant:</td>
                <td>
                    <edit var="enchant" width=120 height=15>
                </td>
            </tr>
        </table>
        <br>
        <button value="Send Donation" action="bypass -h admin_donate $name $id $amount $enchant" width=100 height=21
            back="sek.cbui94" fore="sek.cbui92">
            <br><br>
            <font color="FIXME">Be careful: Offline rewards are stored in DB!</font>
    </center>
</body>

</html>
